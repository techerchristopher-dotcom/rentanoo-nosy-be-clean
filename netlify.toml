[[headers]]
  # index.html : jamais mis en cache pour éviter les chunks périmés après déploiement
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  # Assets hashés (JS/CSS) : cache permanent — le hash change à chaque build
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  # SPA fallback : toutes les routes non-fichier → index.html
  from = "/*"
  to = "/index.html"
  status = 200
